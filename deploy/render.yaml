services:
  - type: web
    name: assemblyai-voice-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: ASSEMBLYAI_REALTIME_URL
        value: wss://speech-to-speech.us.assemblyai.com/v1/realtime
      - key: SERVER_URL
        sync: false
